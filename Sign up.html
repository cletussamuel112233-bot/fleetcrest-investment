<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:50px;
}

form{
  max-width:400px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button{
  background:#d4af37;
  color:black;
  padding:12px 20px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Create Account</h1>

<form action="https://formspree.io/f/mrevlevy" method="POST">

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="password" name="password" placeholder="Password" required>

    <input type="password" name="confirm_password" placeholder="Confirm Password" required>

    <button type="submit">Submit Registration</button>

</formaction="https://formspree.io/f/mrevlevy" method="POST">


</body>
</html>
